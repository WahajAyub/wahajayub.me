name: Collect research candidates

on:
  schedule:
    - cron: "17 6 * * 5"
      timezone: "America/Los_Angeles"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: research-candidate-collection
  cancel-in-progress: true

jobs:
  collect:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install collector dependencies
        run: pip install -r requirements.txt

      - name: Collect and filter papers without AI
        run: python scripts/collect_candidates.py

      - name: Publish the compact candidate file
        run: |
          if git diff --quiet; then
            echo "Candidate set is unchanged."
            exit 0
          fi
          git config user.name "research-radar[bot]"
          git config user.email "research-radar[bot]@users.noreply.github.com"
          git add data/candidates.json
          git commit -m "Refresh research candidates"
          git push
